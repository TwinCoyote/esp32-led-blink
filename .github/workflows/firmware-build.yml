name: Multi Board Firmware CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        board:
          - esp32dev
          - esp32-s3-devkitc-1

    steps:
      - uses: actions/checkout@v4

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build Firmware
        run: pio run -e ${{ matrix.board }}
